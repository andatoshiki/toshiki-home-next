description: |
  The second season of <i>Tsuki ga Michibiku Isekai Douchuu</i>.<br>
  <br>
  After Makoto Misumi defeats Mitsurugi and Sofia Bulga, humanity is saved from the attacking demon army—for the time being. The goddess is aware of Makoto’s growing power, and she sees him as less of a nuisance and more of a rival. Makoto continues his journey to further expand his community of outcasts and connect with more hyumans. But will he be strong enough to hold off the coming storm?<br>
  <br>
  (Source: Crunchyroll)
