description: |
  The second season of <i>Dungeon ni Deai wo Motomeru no wa Machigatteiru Darou ka</i>.<br>
  <br>
  There's rarely a dull moment when you're the champion of a tiny Familia, and things only get rougher for Bell when the God Apollo declares war on Hestia and her followers. With Apollo's Familia able to field a hundred times as many men, Hestia will have to work a lot of favors to keep her Familia from being completely destroyed.<br>
  <br>
  Even if Bell and Hestia manage to pull off the impossible, a major debt that Hestia owes is about to come due and Lili's sordid past comes back to haunt her! Which means that when Bell and his friends come to Lili's aid, it sets into motion yet another impending clash of the titans that may destroy everything!<br>
  <br>
  (Source: Sentai Filmworks)
