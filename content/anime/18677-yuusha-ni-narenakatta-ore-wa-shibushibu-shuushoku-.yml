title:
  romaji: Yuusha ni Narenakatta Ore wa Shibushibu Shuushoku wo Ketsui Shimashita.
  english: I Couldn’t Become a Hero, So I Reluctantly Decided to Get a Job.
  native: 勇者になれなかった俺はしぶしぶ就職を決意しました。
