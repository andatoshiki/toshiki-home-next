description: |
  The story revolves around Raul, a boy who did not become a Hero, since the demon lord was already defeated just before his Hero exams. His dreams dashed, Raul spends his days working at a magic shop in the capital. One day, a part-time job seeker appears at the shop with an amazing résumé:<br><br>
  Name: Phino <br>
  Previous Occupation: Demon Lord Heir<br>
  Motive: Because my father was defeated<br><br>
  The work comedy revolves around this former Hero-in-training and the daughter of the demon lord.
  <br><br>
  (Source: Anime News Network)
