description: |
  The second season of <i>Date A Live</i>.<br>
  <br>
  Shido Itsuka, who used to be a normal high school student at Raizen High, meets the first Spirit, Tohka, and awakens his power to "seal the Spirit's power". Though they may be feared and hated beings due to their immense power, Spirits were always alone and knew only combat and death. Shido, the only one in the world with the power to seal the Spirits' might, hurls himself into life-threatening dates with the beautiful Spirits in order to save them.<br>
  <br>
  (Source: Anime News Network)
