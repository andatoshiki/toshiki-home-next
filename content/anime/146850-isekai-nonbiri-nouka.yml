description: |
  Life cut short by illness at just 39 years old, Machio Hiraku knows not to take simple blessings for granted. When a godlike figure gives him given a chance to live again, Hiraku has only the simplest of wishes for his new life: to be healthy, to live peacefully, to speak the local language, and to spend his days on an idyllic farm. Fresh air, sunshine, honest work, and good company combine to form the happy, peaceful existence Hiraku has always dreamed of.<br>
  <br>
  (Source: HIDIVE)
