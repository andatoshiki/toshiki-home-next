description: |
  The story of the game revolves around Itsuki Yuuge, a high school student who finds out on the day of his graduation ceremony that his cousin and childhood friend Mahiru is pregnant. Immediately afterward, Itsuki and Mahiru are taken to a magical world called Granvania, which is currently being invaded by monsters. The only people who can fight and exorcise the monsters are the "star children," and the star children can only be produced by the 12 "shrine maidens of the constellations." In order to defeat the monsters and return to his own world, Itsuki must father the star children with the maidens.<br><br>

  (Source: Anime News Network)
