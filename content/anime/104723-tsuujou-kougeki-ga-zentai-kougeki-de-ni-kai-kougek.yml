description: |
  What would you do if you got transported into a video game...with your mom?? That's the dilemma facing high schooler Masato Oosuki, who has been unwittingly thrown into an RPG world with his doting mother close behind as part of a secret government scheme. As an avid gamer, Masato is eager to show off his skills...but that's hard to do when your mom is an insanely overpowered, dual-wielding, multi-target specialist!<br><br>

  (Source: Yen Press)
