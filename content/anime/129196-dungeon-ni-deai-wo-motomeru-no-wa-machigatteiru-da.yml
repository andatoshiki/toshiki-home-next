description: |
  The fourth season of <i>Dungeon ni Deai wo Motomeru no wa Machigatteiru Darou ka</i>.<br>
  <br>
  Intrepid adventurer Bell Cranel has leveled up, but he can’t rest on his dungeoneering laurels just yet. The Hestia Familia still has a long way to go before it can stand toe-to-toe with the other Familias of Orario — but before Bell can set out on his next mission, reports of a brutal murder rock the adventuring community! One of Bell’s trusted allies stands accused of the horrible crime, and it’s up to Bell and his friends to clear their name and uncover a nefarious plot brewing in the dungeon’s dark depths.<br>
  <br>
  (Source: Sentai Filmworks)
