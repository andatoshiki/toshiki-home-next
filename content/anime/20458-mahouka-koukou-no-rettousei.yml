description: |
  Magic is a product of neither legends nor fairy tales, but instead has become a technology of reality since a time unknown to people. Supernatural power became a technology systematized through magic, while magic became a technical skill. A "Supernatural Power User" became a "Magic Technician." Magic Technicians (in short, Magicians) are nurtured through Magic High Schools and Universities.<br>
  <br>
  This is a story about: <br>
  <br>
  Tatsuya, a defective elder brother low achiever.<br>
  Miyuki, a perfect, flawless younger sister high achiever.<br>
  After both siblings entered a Magic High School,<br>
  The stage of daily turbulence was unveiled—.
