description: |
  <b>Yamada Elf's Love Song</b>
  <br><br>
  As a novelist with works getting adapted into anime, Elf Yamada holds an event to celebrate her success and to thank everyone who had supported her. With her mother attending, she becomes more excited. However, just as her mother arrives, she tells Elf to go back home so that she can find a suitable husband. Elf, who harbors feelings for Masamune Izumi, chooses to say no…
  <br><br>
  <b>Cooked Meals of Pure Love</b>
  <br><br>
  Winter has come, and it's freezing outside. With her brother Masamune catching a cold, Sagiri Izumi decides to nurse her brother into good health by stepping outside the comfort of her room and doing the housework herself.
  <br><br>
  (Source: MAL Rewrite)
