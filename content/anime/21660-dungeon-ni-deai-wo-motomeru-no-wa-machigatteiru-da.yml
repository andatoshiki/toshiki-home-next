description: |
  Our band of bold adventurers has just blown through the 18th level of the world’s most fearsome dungeon, so what do they do for an encore? Since the city of Orario doesn’t have a theme park, the next choice for Bell, Hestia, Lilly and the gang would seem to be a trip to the hot springs… and, conveniently enough, a battle with some hellhounds has led them to an undiscovered underground oasis! However, there’s something fishy about these springs, beyond the fact that Hermes happens to have bathing suits for all the ladies in their correct sizes! Will the secret be discovered before it’s too late? Will Hestia finally come clean with Bell?<br>
  <br>
  (Source: Sentai Filmworks)
