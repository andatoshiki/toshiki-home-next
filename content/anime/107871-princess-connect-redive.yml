description: |
  Based on an anime RPG smartphone game by Cygames.<br>
  <br>
  Set in the lovely land of Astoria where a gentle wind blows, <i>Princess Connect! Re:Dive</i> follows the adventures of: Yuuki, an amnesiac young man; Kokkoro, a small guide who looks after Yuuki; Pecorine, a beautiful swordswoman who is constantly hungry; and Karyl, a cat-eared magical girl with a somewhat cool personality. These fateful four form a guild entitled "Bishoku-den" ("Epicurean Hall") and embark on delicious adventures together.<br>
  <br>
  (Source: Crunchyroll)
