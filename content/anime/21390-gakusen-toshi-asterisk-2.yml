description: |
  Second season of Gakusen Toshi Asterisk.<br><br>

  Less than a century ago a meteor collided with the planet's surface and the resulting disaster caused the next generation of humanity to develop a wide variety of amazing abilities. In the center of the meteor's crater lies Rikka, a system of six academies known as the Asterisk. Ayato Amagiri enters the Asterisk as a transfer student hoping to compete in a special battle event known as the Festa. However, he quickly finds himself on the bad side of one of the strongest fighters around—the beautiful but fiery Julis-Alexa von Riessfeld. To stand against her he'll have to rely on his own sword-wielding ability, but when the tables turn, will they be able to team up to take down the competition? <br><br>
  (Source: Anime News Network)
