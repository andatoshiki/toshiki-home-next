title:
  romaji: Dungeon ni Deai wo Motomeru no wa Machigatteiru Darou ka
  english: Is It Wrong to Try to Pick Up Girls in a Dungeon?
  native: ダンジョンに出会いを求めるのは間違っているだろうか
  userPreferred: Dungeon ni Deai wo Motomeru no wa Machigatteiru Darou ka
description: |
  Some adventurers delve into the sprawling labyrinths beneath the city of Orario to find fame and fortune. Others come to test their skills against the legions of monsters lurking in the darkness below. However, Bell Cranel’s grandfather told him a different reason: it’s a great place to rescue (and subsequently meet) girls! Now that Bell’s a dungeon delver himself, the ladies he’s encountering aren’t the helpless damsels in distress he’d imagined, and one of them, the beautiful swordswoman Ais Wallenstein, keeps rescuing Bell instead. As embarrassing as that is, it’s nothing compared to what happens when goddesses get involved. Freya, Hephaistos, and Loki, with their powerful Familias, are intimidating enough, but there’s one goddess whose relationship with Bell is certain to spark trouble.<br>
  <br>
  (Source: Sentai Filmworks)
