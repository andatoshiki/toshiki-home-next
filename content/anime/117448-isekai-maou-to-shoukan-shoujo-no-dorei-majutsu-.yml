description: |
  The second season of <i>Isekai Maou to Shoukan Shoujo no Dorei Majutsu</i>.<br>
  <br>
  Diablo is back! You know…the Demon Lord from another world? Traveling through the woods with Rem and Shera, they encounter a lone girl in tatters, pursued by a powerful Paladin.<br>
  <br>
  You know what that means—Diablo will have to try and hide his lack of social skills once again (and come to her rescue, of course). Let the enchanting adventures continue!<br>
  <br>
