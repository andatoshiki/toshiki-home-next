description: 'Part history, part narrative, The Lord of the Ring takes readers on a fascinating journey back to the 18th century Moravian renewal movement and 100-year prayer watch. Experience the passion of young Count Nikolaus Ludwig von Zinzendorf and his friends as they took a vow to serve Christ their King faithfully in whatever situation of life they found themselves. Signed by the five school friends and illustrated in a medallion made by Zinzendorf’s grandmother, the vow of the “Confessors of Christ” is as relevant today as when it first was conceived in 1716. Join Phil Anderson on an aerial road trip via his three-seater plane as he undertakes a 21st century pilgrimage from England to Germany. Anderson retraces the steps of Zinzendorf, reconnects with his legacy and seeks to apply it to life and faith in a new millennium. Learning from the past, readers will discover crucial signposts for grappling with the Church of today’s identity and calling as an authentic, relational, missional community.'
