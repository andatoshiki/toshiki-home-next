title: 'Beautiful Outlaw: Experiencing the Playful, Disruptive, Extravagant Personality of Jesus'
subtitle: 'Experiencing the Playful, Disruptive, Extravagant Personality of Jesus'
slug: 'beautiful-outlaw'
description: "Reading the Gospels without knowing the personality of Jesus is like watching television with the sound turned off. The result is a dry, two dimensional person doing strange, undecipherable things. In BEAUTIFUL OUTLAW, John Eldredge removes the religious varnish to help readers discover stunning new insights into the humanity of Jesus. He was accused of breaking the law, keeping bad company, heavy drinking. Of being the devil himself. He was so compelling and dangerous they had to kill him. But others loved him passionately. He had a sense of humor. His generosity was scandalous. His anger made enemies tremble. He'd say the most outrageous things. He was definitely not the Jesus of the stained glass. In the author's winsome, narrative approach, he breaks Jesus out of the typical stereotypes, just as he set masculinity free in his book, Wild at Heart. By uncovering the real Jesus, readers are welcomed into the rich emotional life of Christ. All of the remarkable qualities of Jesus burst like fireworks with color and brilliance because of his humanity. Eldredge goes on to show readers how they can experience this Jesus in their lives every day. This book will quicken readers' worship, and deepen their intimacy with Jesus."
